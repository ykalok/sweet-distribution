server:
  port: 8080

spring:
  application:
    name: sweetdistribution

  datasource:
    url: jdbc:postgresql://localhost:5432/sweetdistribution
    username: postgres
    password: 9969
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000


  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# JWT Configuration
jwt:
  secret: YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!!
  expiration: 86400000

# Razorpay Configuration
razorpay:
  key-id: rzp_test_placeholder
  key-secret: test_secret_placeholder

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging
logging:
  level:
    com.sweetdistribution: DEBUG
