server:
  port: 8080

spring:
  application:
    name: sweetdistribution

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/sweet-distribution}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:testing123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000


  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!!}
  expiration: ${JWT_EXPIRATION:86400000}

# Razorpay Configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:test_secret_placeholder}

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}

# Logging
logging:
  level:
    com.sweetdistribution: ${LOG_LEVEL:INFO}
